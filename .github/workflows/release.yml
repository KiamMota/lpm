name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get install -y libssl-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-linux-amd64
          path: build/lpm

  linux-i386:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get install -y gcc-multilib g++-multilib libssl-dev:i386
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-m32" \
            -DCMAKE_C_FLAGS="-m32"
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-linux-i386
          path: build/lpm

  windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCURL_USE_SCHANNEL=ON -DCURL_USE_OPENSSL=OFF
          cmake --build build --config Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-windows-amd64
          path: build/Release/lpm.exe

  windows-i386:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -A Win32 -DCURL_USE_SCHANNEL=ON -DCURL_USE_OPENSSL=OFF
          cmake --build build --config Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-windows-i386
          path: build/Release/lpm.exe

  macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCURL_USE_SECTRANSP=ON -DCURL_USE_OPENSSL=OFF
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-macos-amd64
          path: build/lpm

  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCURL_USE_SECTRANSP=ON -DCURL_USE_OPENSSL=OFF
          cmake --build build
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lpm-macos-arm64
          path: build/lpm

  release:
    needs: [linux-amd64, linux-i386, windows-amd64, windows-i386, macos-amd64, macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Rename binaries
        run: |
          mv lpm-linux-amd64/lpm  lpm-linux-amd64
          mv lpm-linux-i386/lpm   lpm-linux-i386
          mv lpm-windows-amd64/lpm.exe lpm-windows-amd64.exe
          mv lpm-windows-i386/lpm.exe  lpm-windows-i386.exe
          mv lpm-macos-amd64/lpm  lpm-macos-amd64
          mv lpm-macos-arm64/lpm  lpm-macos-arm64
          cp lpm-linux-amd64 lpm
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lpm
            lpm-linux-amd64
            lpm-linux-i386
            lpm-windows-amd64.exe
            lpm-windows-i386.exe
            lpm-macos-amd64
            lpm-macos-arm64
